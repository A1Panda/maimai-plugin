<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>背景信息</title>
<style>
:root {
    --card-bg: rgba(255,255,255,0.06);
    --text: #e0e0f0;
    --sub: #9090b0;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: linear-gradient(145deg, #0a0a1a 0%, #13132b 30%, #1a0a2e 55%, #0d1b2a 100%);
    color: var(--text);
    font-family: "Microsoft YaHei", -apple-system, sans-serif;
    padding: 24px;
}

.container {
    max-width: 720px;
    margin: 0 auto;
    background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.08);
}

.page-title {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(135deg, #e0c3ff, #ffb3d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
}

.preview {
    text-align: center;
    padding: 24px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    margin-bottom: 20px;
}
.preview-label {
    font-size: 12px;
    color: var(--sub);
    letter-spacing: 1px;
    margin-bottom: 12px;
}
.preview img {
    max-width: 100%;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.info-grid {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 10px 16px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
}
.info-label { font-size: 13px; color: var(--sub); font-weight: 600; padding: 6px 0; }
.info-val { font-size: 14px; font-weight: 700; color: var(--text); padding: 6px 0; }

.requirements {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 20px;
}
.req-header {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.req-item { margin-bottom: 16px; }
.req-item:last-child { margin-bottom: 0; }
.req-text {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    margin-bottom: 10px;
}
.song-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 6px;
    margin-top: 8px;
}
.song-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.03);
}
.song-id {
    font-family: monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04);
    padding: 2px 8px;
    border-radius: 6px;
    min-width: 50px;
    text-align: center;
}
.song-name { flex:1; font-weight: 600; color: var(--text); }
.song-type {
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(180,77,255,0.1);
    color: rgba(255,255,255,0.5);
    border-radius: 6px;
}
</style>
</head>
<body>
<div class="container">
    <div class="page-title">背景详细信息</div>

    {{#frame}}
    <div class="preview">
        <div class="preview-label">预览效果</div>
        <img src="{{frame}}" alt="背景预览">
    </div>
    {{/frame}}

    <div class="info-grid">
        <span class="info-label">ID</span>
        <span class="info-val">{{id}}</span>
        <span class="info-label">名称</span>
        <span class="info-val">{{name}}</span>
        <span class="info-label">描述</span>
        <span class="info-val">{{description}}</span>
        <span class="info-label">类型</span>
        <span class="info-val">{{genre}}</span>
    </div>

    {{#hasRequirements}}
    <div class="requirements">
        <div class="req-header">获取条件</div>
        {{#requirements}}
        <div class="req-item">
            <div class="req-text">{{text}}</div>
            {{#hasSongs}}
            <div class="song-grid">
                {{#songs}}
                <div class="song-item">
                    <span class="song-id">#{{id}}</span>
                    <span class="song-name">{{title}}</span>
                    <span class="song-type">{{type}}</span>
                </div>
                {{/songs}}
            </div>
            {{/hasSongs}}
        </div>
        {{/requirements}}
    </div>
    {{/hasRequirements}}
</div>
</body>
</html>
