<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帮助菜单</title>
<style>
:root {
    --card-bg: rgba(255,255,255,0.06);
    --text: #e0e0f0;
    --sub: #9090b0;
    --dx-pink: #ff4da6;
    --dx-purple: #b44dff;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: linear-gradient(145deg, #0a0a1a 0%, #13132b 30%, #1a0a2e 55%, #0d1b2a 100%);
    color: var(--text);
    font-family: "Microsoft YaHei", -apple-system, sans-serif;
    padding: 24px;
}

.container {
    max-width: 580px;
    margin: 0 auto;
    background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.08);
}

.page-title {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(135deg, var(--dx-pink), var(--dx-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
}

.group {
    margin-bottom: 20px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 16px;
}
.group:last-child { margin-bottom: 0; }

.group-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--dx-pink);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    letter-spacing: 1px;
}

.cmd-list { list-style: none; }

.cmd-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    transition: background 0.15s;
    gap: 12px;
}
.cmd-item:hover { background: rgba(255,255,255,0.04); }

.cmd-code {
    font-size: 14px;
    font-weight: 700;
    color: var(--dx-purple);
    padding: 4px 10px;
    background: rgba(180,77,255,0.08);
    border: 1px solid rgba(180,77,255,0.12);
    border-radius: 8px;
    white-space: nowrap;
}
.cmd-desc {
    font-size: 13px;
    color: var(--sub);
    text-align: right;
    font-weight: 600;
}

.footer {
    text-align: center;
    padding-top: 20px;
    margin-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
    <div class="page-title">{{title}}</div>
    {{#groups}}
    <div class="group">
        <div class="group-title">{{groupTitle}}</div>
        <ul class="cmd-list">
            {{#commands}}
            <li class="cmd-item">
                <span class="cmd-code">{{command}}</span>
                <span class="cmd-desc">{{description}}</span>
            </li>
            {{/commands}}
        </ul>
    </div>
    {{/groups}}
    <div class="footer">{{footer}}</div>
</div>
</body>
</html>
