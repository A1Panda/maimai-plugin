<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>玩家信息 - MiLK Style</title>
<style>
:root {
    --bg-main: #fdf2f7;
    --pink-main: #ff76b8;
    --text-dark: #5c4b54;
    --card-white: rgba(255, 255, 255, 0.95);
    --accent-purple: #9f51dc;
    --gold: #ffa000;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background-color: var(--bg-main);
    background-image: radial-gradient(#ffcae5 1.5px, transparent 1.5px);
    background-size: 20px 20px;
    color: var(--text-dark);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 30px;
}

.container {
    max-width: 700px;
    margin: 0 auto;
    background: var(--card-white);
    border-radius: 24px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(255, 118, 184, 0.2);
    border: 3px solid #fff;
}

/* 头部：姓名框 + 头像 */
.header {
    position: relative;
    display: flex;
    align-items: center;
    padding: 30px 28px;
    background: linear-gradient(135deg, #fff0f5, #ffe8f0);
    border-bottom: 2px dashed #ffdeed;
    min-height: 160px;
}
.header::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse 300px 160px at 50% 50%, rgba(255,118,184,0.08), transparent);
    pointer-events: none;
}

.header-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
}
.name-plate {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    opacity: 0.3;
    pointer-events: none;
    z-index: 1;
}

.avatar { position: relative; z-index: 2; flex-shrink: 0; margin-right: 20px; }
.icon {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 4px solid var(--pink-main);
    box-shadow: 0 0 25px rgba(255,118,184,0.25);
}

.info { position: relative; z-index: 2; flex: 1; }

.name {
    font-size: 26px;
    font-weight: 800;
    color: var(--pink-main);
    margin-bottom: 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.rating {
    display: inline-block;
    font-size: 16px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,160,0,0.12), rgba(255,200,0,0.08));
    color: var(--gold);
    border: 1px solid rgba(255,160,0,0.15);
    margin-bottom: 10px;
}

.game-stats {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 8px;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-item img { height: 28px; }
.stat-item.star { color: var(--gold); font-size: 16px; font-weight: 700; }

/* 装扮区 */
.cosmetics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 24px 28px;
}

.cosmetic-card {
    background: #fffafa;
    border-radius: 16px;
    padding: 16px;
    transition: all 0.2s;
    border-bottom: 3px solid #ffdeed;
}
.cosmetic-card:hover {
    background: #fff0f5;
}
.cosmetic-label {
    font-size: 11px;
    color: #b0a0a8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}
.cosmetic-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 2px;
}
.cosmetic-genre {
    font-size: 12px;
    color: #c0b0b8;
}
.cosmetic-id {
    float: right;
    font-size: 11px;
    font-family: monospace;
    color: #c0b0b8;
    padding: 2px 8px;
    background: #f0e8ec;
    border-radius: 6px;
}

/* 底部 */
.footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    border-top: 2px dashed #ffdeed;
    font-size: 13px;
}
.friend-code { color: #b0a0a8; font-weight: 600; }
.upload-time { color: #c0b0b8; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <img class="header-frame" src="{{frameAsset}}" alt="Frame">
        <img class="name-plate" src="{{plateAsset}}" alt="姓名框">
        <div class="avatar">
            <img class="icon" src="{{iconAsset}}" alt="头像">
        </div>
        <div class="info">
            <div class="name">{{name}}</div>
            <div class="rating">Rating {{rating}}</div>
            <div class="game-stats">
                <div class="stat-item">
                    <img src="{{courseRankAsset}}" alt="段位">
                </div>
                <div class="stat-item">
                    <img src="{{classRankAsset}}" alt="阶级" style="height:38px">
                </div>
                <div class="stat-item star">★{{star}}</div>
            </div>
        </div>
    </div>

    <div class="cosmetics">
        <div class="cosmetic-card">
            <span class="cosmetic-id">ID:{{icon.id}}</span>
            <div class="cosmetic-label">Icon</div>
            <div class="cosmetic-name">{{icon.name}}</div>
            <div class="cosmetic-genre">{{icon.genre}}</div>
        </div>
        <div class="cosmetic-card">
            <span class="cosmetic-id">ID:{{name_plate.id}}</span>
            <div class="cosmetic-label">Plate</div>
            <div class="cosmetic-name">{{name_plate.name}}</div>
            <div class="cosmetic-genre">{{name_plate.genre}}</div>
        </div>
        <div class="cosmetic-card">
            <span class="cosmetic-id">ID:{{frame.id}}</span>
            <div class="cosmetic-label">Frame</div>
            <div class="cosmetic-name">{{frame.name}}</div>
            <div class="cosmetic-genre">{{frame.genre}}</div>
        </div>
        <div class="cosmetic-card">
            <span class="cosmetic-id">ID:{{trophy.id}}</span>
            <div class="cosmetic-label">Trophy</div>
            <div class="cosmetic-name">{{trophy.name}}</div>
        </div>
    </div>

    <div class="footer">
        <span class="friend-code">FC: {{friend_code}}</span>
        <span class="upload-time">{{upload_time}}</span>
    </div>
</div>
</body>
</html>
