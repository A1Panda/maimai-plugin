<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
    --bg-main: #fdf2f7;
    --pink-main: #ff76b8;
    --text-dark: #4a3a42;
    --gold-rating: #f0c342;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }

body {
    background-color: var(--bg-main);
    padding: 20px;
    display: flex;
    justify-content: center;
}

/* 全局背景图 */
.full-page-background {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    object-fit: cover;
    opacity: 0.5;
}

.container {
    width: 850px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 40px 0;
    box-shadow: 0 20px 60px rgba(255, 118, 184, 0.2);
    border: 2px solid #fff;
    position: relative;
    z-index: 10;
}

/* 头部：名牌容器 */
.header {
    position: relative;
    width: 100%;
    height: 180px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
}

.name-plate-container {
    position: relative;
    width: 760px;
    height: 154px;
}

.plate-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    z-index: 1;
}

/* 核心内容对齐层 */
.plate-content {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    padding: 0 45px;
}

/* 头像框 */
.avatar-wrapper {
    width: 105px; height: 105px;
    border: 3.5px solid #3a3a3a;
    border-radius: 12px;
    margin-left: 5px;
    overflow: hidden;
    flex-shrink: 0;
    background: #fff;
}
.avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

/* 用户信息区 */
.user-main-data {
    flex: 1;
    margin-left: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
}

/* Rating 行 */
.data-row-top {
    display: flex;
    align-items: center;
    gap: 15px;
}
.rating-badge {
    background: #2b2b2b;
    color: var(--gold-rating);
    padding: 2px 14px;
    border-radius: 6px;
    font-weight: 900;
    font-size: 19px;
    font-style: italic;
    border-bottom: 3.5px solid #000;
}
.class-badge {
    height: 38px;
    width: auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

/* 名字框 */
.name-box {
    background: #fff;
    border: 2.5px solid #444;
    border-radius: 6px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    width: 410px;
    margin-top: 2px;
}
.player-name {
    font-size: 24px;
    font-weight: 900;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.course-rank-img {
    height: 32px;
    width: auto;
    object-fit: contain;
}

/* 下方装饰网格 */
.cosmetics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 40px 45px 20px;
}
.cos-card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 18px;
    border-bottom: 5px solid #ffcae5;
    position: relative;
}
.cos-id-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; color: #ccc; }
.cos-label { font-size: 11px; font-weight: 900; color: var(--pink-main); margin-bottom: 5px; text-transform: uppercase; }
.cos-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }

/* Footer */
.footer {
    margin-top: 20px;
    padding: 20px 45px;
    border-top: 2px dashed #ffcae5;
    display: flex;
    justify-content: space-between;
    color: #b0a0a8;
    font-size: 12px;
    font-weight: bold;
}
</style>
</head>
<body>
    <img class="full-page-background" src="{{frameAsset}}">

    <div class="container">
        <div class="header">
            <div class="name-plate-container">
                <img class="plate-img" src="{{plateAsset}}">
                <div class="plate-content">
                    <div class="avatar-wrapper"><img src="{{iconAsset}}"></div>
                    <div class="user-main-data">
                        <div class="data-row-top">
                            <div class="rating-badge">DX RATING {{rating}}</div>
                            <img src="{{classRankAsset}}" class="class-badge">
                            <span style="font-weight: 900; color: #444; font-size: 16px;">★ {{star}}</span>
                        </div>
                        <div class="name-box">
                            <div class="player-name">{{name}}</div>
                            <img class="course-rank-img" src="{{courseRankAsset}}" alt="段位">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cosmetics-grid">
            <div class="cos-card">
                <span class="cos-id-tag">#{{icon.id}}</span>
                <div class="cos-label">Icon</div>
                <div class="cos-name">{{icon.name}}</div>
            </div>
            <div class="cos-card">
                <span class="cos-id-tag">#{{name_plate.id}}</span>
                <div class="cos-label">Plate</div>
                <div class="cos-name">{{name_plate.name}}</div>
            </div>
            <div class="cos-card">
                <span class="cos-id-tag">#{{frame.id}}</span>
                <div class="cos-label">Frame</div>
                <div class="cos-name">{{frame.name}}</div>
            </div>
            <div class="cos-card">
                <span class="cos-id-tag">#{{trophy.id}}</span>
                <div class="cos-label">Trophy</div>
                <div class="cos-name">{{trophy.name}}</div>
            </div>
        </div>

        <div class="footer">
            <span>FRIEND CODE: {{friend_code}}</span>
            <span>GENERATED AT: {{upload_time}}</span>
        </div>
    </div>
</body>
</html>
